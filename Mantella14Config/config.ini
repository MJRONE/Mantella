fallout4_multi_npc_prompt = "\# Overview\nThe following is a conversation in the post-apocalyptic Commonwealth of Fallout between {names_w_player}.\n\n\# Background\n{bios}\n\n\# History\n{conversation_summaries}\n\n\# Current Scene\nThe location is now {location}. The time is {time} {time_group}.\n\n\# Rules\n{actions}\nUse tools to perform actions where appropriate.\nYou are tasked with providing the responses for the NPCs. Begin your response with an indication of who you are speaking as, for example: '{name}: Good evening.'.\nUse your own discretion to decide who should speak in a given situation (sometimes responding with all NPCs is suitable).\nOutput ONLY spoken dialogue. No narration, no descriptions, no thoughts.\nDo not use quotation marks.\nStay in character.\n\nRemember, you can only respond as {names}. Ensure to use their full name when responding. Respond now in {language}."

; fallout4_radiant_prompt
;   The starting prompt sent to the LLM when a radiant conversation is started.
;                                   The following are dynamic variables that need to be contained in curly brackets {}:
;                                   name = the NPC's name
;                                   names = the names of all NPCs in the conversation
;                                   game = the selected game
;                                   bio = the backgrounds of the NPCs
;                                   location = the current location
;                                   weather = the current weather
;                                   time = the time of day as a number (eg 1, 22)
;                                   time_group = the time of day in words (eg "in the morning", "at night")
;                                   language = the selected language
;                                   conversation_summary = reads the latest conversation summaries for the NPCs stored in data/conversations/NPC_Name/NPC_Name_summary_X.txt
;                                   equipment = a basic description of the equipment the NPCs carry
;                                   actions = instructions for the LLM to trigger actions (if advanced actions are disabled, otherwise action instructions are already passed to the LLM as tools via the 'description' field)
;   default = # Overview
;   The following is a conversation in the post-apocalyptic Commonwealth of Fallout between {names}.
;   
;   # Background
;   {bios}
;   
;   # History
;   {conversation_summaries}
;   
;   # Current Scene
;   The location is now {location}. The time is {time} {time_group}.
;   
;   # Rules
;   {actions}
;   Use tools to perform actions where appropriate.
;   You are tasked with providing the responses for the NPCs. Begin your response with an indication of who you are speaking as, for example: '{name}: Good evening.'.
;   Multiple NPCs should speak each turn.
;   Output ONLY spoken dialogue. No narration, no descriptions, no thoughts.
;   Do not use quotation marks.
;   Stay in character.
;   
;   Remember, you can only respond as {names}. Ensure to use their full name when responding. Respond now in {language}.
fallout4_radiant_prompt = "\# Overview\nThe following is a conversation in the post-apocalyptic Commonwealth of Fallout between {names}.\n\n\# Background\n{bios}\n\n\# History\n{conversation_summaries}\n\n\# Current Scene\nThe location is now {location}. The time is {time} {time_group}.\n\n\# Rules\n{actions}\nUse tools to perform actions where appropriate.\nYou are tasked with providing the responses for the NPCs. Begin your response with an indication of who you are speaking as, for example: '{name}: Good evening.'.\nMultiple NPCs should speak each turn.\nOutput ONLY spoken dialogue. No narration, no descriptions, no thoughts.\nDo not use quotation marks.\nStay in character.\n\nRemember, you can only respond as {names}. Ensure to use their full name when responding. Respond now in {language}."

; memory_prompt
;   The prompt used to summarize a conversation and save to the NPC's memories in data/game/conversations/NPC_Name/NPC_Name_summary_X.txt.
;                                            	If you would like to edit this, please ensure that the below dynamic variables are contained in curly brackets {}:
;                                                  name = the NPC name(s)
;                                                  language = the selected language
;                                                  game = the game selected
;                                                  bios = the NPC bio(s)
;                                                  conversation_summaries = summaries of previous conversations
;                                                  player_name = the player's name
;   default = You are tasked with summarizing the conversation between {name} and {player_name} (and any other characters present). These conversations take place in {game}.
;   
;   Here are the character bios for context:
;   {bios}
;   
;   Here are the previous conversation summaries for context:
;   {conversation_summaries}
;   
;   It is not necessary to comment on any mixups in communication such as mishearings. Text contained within brackets state in-game events.
;   Please summarize the conversation into a single paragraph in {language}.
memory_prompt = "You are tasked with summarizing the conversation between {name} and {player_name} (and any other characters present). These conversations take place in {game}.\n\nHere are the character bios for context:\n{bios}\n\nHere are the previous conversation summaries for context:\n{conversation_summaries}\n\nIt is not necessary to comment on any mixups in communication such as mishearings. Text contained within brackets state in-game events.\nPlease summarize the conversation into a single paragraph in {language}."

; memory_prompt_datetime_prefix
;   Whether to prepend a timestamp of when the conversation took place (eg "[Day 42, 5 in the early evening]") to the summary.
;   memory_prompt_datetime_prefix must either be 'True' or 'False'
;   default = True
memory_prompt_datetime_prefix = True

; resummarize_prompt
;   Memories build up over time in data/game/conversations/NPC_Name/NPC_Name_summary_X.txt.
;                                               When these memories become too long to fit into the chosen LLM's maximum context length, these memories need to be condensed down.
;                                               This prompt is used to ask the LLM to summarize an NPC's memories into a single paragraph, and starts a new memory file in data/game/conversations/NPC_Name/NPC_Name_summary_X+1.txt.
;                                               If you would like to edit this, please ensure that the below dynamic variables are contained in curly brackets {}:
;                                                   name = the NPC's name
;                                                   language = the selected language
;                                                   game = the game selected
;                                                   player_name = the player's name
;   default = You are tasked with summarizing the conversation history between {name} and {player_name} (the player) / other characters. These conversations take place in {game}.
;                                               Each paragraph represents a conversation at a new point in time. Timestamps in square brackets (eg [Day 42, 5 in the early evening]) indicate when each conversation occurred. Please summarize these conversations into a single paragraph in {language}.
resummarize_prompt = "You are tasked with summarizing the conversation history between {name} and {player_name} (the player) / other characters. These conversations take place in {game}.\n                                            Each paragraph represents a conversation at a new point in time. Timestamps in square brackets (eg [Day 42, 5 in the early evening]) indicate when each conversation occurred. Please summarize these conversations into a single paragraph in {language}."

; vision_prompt
;   The prompt passed to the vision-capable LLM when `Custom Vision Model` is enabled.
;   default = This image is to give context and is from the player's point of view in the game of {game}.
;                               Describe the details visible inside it without mentioning the game. Refer to it as a scene instead of an image.
vision_prompt = "This image is to give context and is from the player's point of view in the game of {game}.\n                            Describe the details visible inside it without mentioning the game. Refer to it as a scene instead of an image."

; function_llm_prompt
;   The prompt sent to the separate function calling LLM when `Custom Function Model` is enabled.
;                               This LLM analyzes the recent conversation and determines which in-game actions (if any) should be triggered.
;                               The following are dynamic variables that need to be contained in curly brackets {}:
;                               game = the selected game
;   default = You are analyzing a conversation in {game} to determine if any in-game actions should be triggered.
;                                   Based on the recent dialogue, call the appropriate functions to execute actions.
;                                   If no actions are needed, do not call any functions.
function_llm_prompt = "You are analyzing a conversation in {game} to determine if any in-game actions should be triggered.\n                                Based on the recent dialogue, call the appropriate functions to execute actions.\n                                If no actions are needed, do not call any functions."

; radiant_start_prompt
;   Once a radiant conversation has started and the radiant prompt has been passed to the LLM, the below text is passed in replace of the player response.
;                                           This prompt is used to steer the radiant conversation.
;   default = Please begin / continue a conversation topic (greetings are not needed). Ensure to change the topic if the current one is losing steam.
;                               The conversation should steer towards topics which reveal information about the characters and who they are, or instead drive forward previous conversations in their memory.
radiant_start_prompt = "Please begin / continue a conversation topic (greetings are not needed). Ensure to change the topic if the current one is losing steam.\n                            The conversation should steer towards topics which reveal information about the characters and who they are, or instead drive forward previous conversations in their memory."

; radiant_continue_prompt
;   The prompt sent to the LLM between turns in a radiant conversation to keep the conversation going.
;                                               This is used for intermediate turns when Radiant Max Turns is greater than 2.
;   default = Continue the conversation, or call the EndConversation action if the conversation has naturally concluded.
radiant_continue_prompt = Continue the conversation, or call the EndConversation action if the conversation has naturally concluded.

; radiant_end_prompt
;   The final prompt sent to the LLM before ending a radiant conversation.
;                                               This prompt is used to guide the LLM to end the conversation naturally.
;   default = Please wrap up the current topic between the NPCs in a natural way. Nobody is leaving, so there is no need for formal goodbyes.
radiant_end_prompt = Please wrap up the current topic between the NPCs in a natural way. Nobody is leaving, so there is no need for formal goodbyes.

; radiant_max_turns
;   The maximum number of LLM response turns in a radiant conversation.
;                                               Higher values allow for longer conversations.
;                                               If the EndConversation action is enabled for radiant conversation,
;                                               the LLM may choose to end the conversation earlier if it naturally concludes.
;   radiant_max_turns must be an integer between 2 and 999
;   default = 2
;   Note: a value of 2 means only the start prompt + end prompt are sent to the
;   LLM, resulting in a very short conversation (usually 2 NPC lines total).
;   Bump this up for meaningful back-and-forth. 8 gives ~6 continue turns before
;   the end-prompt.
radiant_max_turns = 6

; radiant_player_interrupt
;   If enabled, the player can speak into a running radiant (NPC-to-NPC) conversation.
;   The player's voice is transcribed and injected as an event (e.g. *The player says: "..."*)
;   into the next radiant user message, so the NPCs can react to the player and the
;   conversation continues naturally as a radiant chat.
;   Requires `Allow Interruption` to be enabled and a microphone input mode (not text input).
;   Disable this if background noise or in-game speech accidentally injects garbage into
;   your radiant conversations.
;   default = 1
radiant_player_interrupt = 1

[Startup]
; Startup settings.

; auto_launch_ui
;   Whether the Mantella UI should launch automatically in your browser.
;   auto_launch_ui must either be 'True' or 'False'
;   default = True
auto_launch_ui = False

; play_startup_sound
;   Whether to play a startup sound to let you know when Mantella is ready.
;   play_startup_sound must either be 'True' or 'False'
;   default = True
play_startup_sound = True

; remove_mei_folders
;   Clean up older instances of Mantella runtime folders from /data/tmp/_MEIxxxxxx.
;                                               These folders build up over time when Mantella.exe is run.
;                                               Enable this option to clean up these previous folders automatically when Mantella.exe is run.
;                                               Disable this option if running this cleanup inteferes with other Python exes.
;                                               For more details on what this is, see here: https://github.com/pyinstaller/pyinstaller/issues/2379
;   remove_mei_folders must either be 'True' or 'False'
;   default = True
remove_mei_folders = True

[Profiles]
; Profile settings.

; apply_model_profiles
;   When enabled, Mantella will use saved model profiles to override manual LLM parameters.
;                           Model profiles store per-model parameters (temperature, max_tokens, etc) and are applied automatically when a matching profile exists.
;   apply_model_profiles must either be 'True' or 'False'
;   default = False
apply_model_profiles = False

; profile_selected_service
;   Select the LLM service for the profile you want to create or edit.
;                           After selecting a service, choose a model from the available models list below.
;   Options: OpenRouter, OpenAI, NanoGPT, KoboldCpp, textgenwebui
;   default = OpenRouter
profile_selected_service = OpenRouter

; profile_selected_model
;   Select or type the model name for the profile.
;                           Press the *Update* button to load a list of available models from the service selected above.
;   Options: Custom Model
;   default = google/gemma-4-26b-a4b-it:free
profile_selected_model = google/gemma-4-26b-a4b-it:free

; profile_parameters
;   Parameters passed as part of the request to the model selected above.
;                           A list of the most common parameters can be found here: https://openrouter.ai/docs/parameters.
;                           Note that available parameters can vary per LLM provider.
;   default = {
;                           "max_tokens": 250,
;                           "stop": ["#"]
;                       }
profile_parameters = "{\n                        \"max_tokens\": 250,\n                        \"stop\": [\"\#\"]\n                    }"

[Other]
; Other settings.

; automatic_greeting
;   Should a conversation be started with an automatic greeting from the LLM / NPC.
;                                           - If enabled: Conversations are always started by the LLM.
;                                           - If disabled: The LLM will not respond until the player speaks first.
;   automatic_greeting must either be 'True' or 'False'
;   default = True
automatic_greeting = True

; max_count_events
;   Maximum number of in-game events that are sent to the LLM per player message.
;                                       If the maximum number is reached, the oldest events will be dropped.
;                                       Increasing this number will cost more prompt tokens and lead to the context limit being reached faster.
;   max_count_events must be an integer between 0 and 999999
;   default = 5
max_count_events = 50

; events_refresh_time
;   Determines how much time (in seconds) can pass between the last NPC's response and the player's input before in-game events need to be refreshed.
;                                           Note that updating in-game events increases response times. If the player responds before this set number in seconds, response times will be reduced.
;                                           Increase this value to allow more time for the player to respond before events need to be refreshed. Decrease this value to make in-game events more up to date.
;   events_refresh_time must be an integer between 0 and 999999
;   default = 10
events_refresh_time = 120

; hourly_time
;   If enabled, NPCs will be made aware of the time every in-game hour. Otherwise, time updates will be less granular (eg 'The conversation now takes place in the morning' / 'at night' etc).
;                           To remove mentions of the hour entirely, prompts also need to be edited from 'The time is {time} {time_group}.' to 'The conversation takes place {time_group}.'
;   hourly_time must either be 'True' or 'False'
;   default = False
hourly_time = False

; player_character_description
;   A description of your player character in-game. This is sent to the LLM as part of the prompt using the '{player_description}' variable.
;                                                       This is not meant to be a bio but rather a description how the NPC(s) perceive the player character when they speak to them.
;                                                       e.g. 'A tall man with long red hair.'
;                                                       If the in-game MCM offers to set this option the text sent from the game takes precendence over this.
player_character_description = MJR is a athlethic man and as a dragonborn, the hero of skyrim.

; voice_player_input
;   Should the input of the player (both by text or voice) be spoken by the player character in-game?
;                                               Can be used for immersion or to fill the initial gap between input and reply.
;                                               Use the 'Player Voice Model' setting to select the voice model of the TTS for the player character.
;   voice_player_input must either be 'True' or 'False'
;   default = False
voice_player_input = False

; player_voice_model
;   The voice model for the player character to use if 'Voice player input' is activated.
player_voice_model =

; conversation_summary_enabled
;   Whether to generate and save conversation summaries when conversations end.
;                           If enabled: Summaries will be generated and saved to let NPCs remember past conversations.
;                           If disabled: No summaries will be generated when conversations end.
;                           Note: Summaries are still generated when a conversation exceeds the context window.
;   conversation_summary_enabled must either be 'True' or 'False'
;   default = True
conversation_summary_enabled = True

; enable_character_tag_reading
;   Enable tag-based bio expansion for characters. When enabled, comma-separated tags in the character CSV 'tags' column will be looked up in bio_templates.csv and appended to the character's bio.
;   enable_character_tag_reading must either be 'True' or 'False'
;   default = False
enable_character_tag_reading = False

; save_audio_data_to_character_folder
;   Whether to save audio data to an NPC's voice folder instead of MantellaVoice00.
;                           Enable this value if voicelines are not being played in-game.
;   save_audio_data_to_character_folder must either be 'True' or 'False'
;   default = False
save_audio_data_to_character_folder = False

; port
;   The port for the Mantella HTTP server to use.
;   port must be an integer between 0 and 65535
;   default = 4999
port = 4999

; show_http_debug_messages
;   Display the JSON going in and out of the server in Mantella.exe's log.
;   show_http_debug_messages must either be 'True' or 'False'
;   default = False
show_http_debug_messages = False

; advanced_logs
;   Save advanced logs to Mantella's My Games/Mantella/logging.log file.
;                           Useful for troubleshooting issues.
;   advanced_logs must either be 'True' or 'False'
;   default = False
advanced_logs = False

; enable_telemetry
;   Enable Open Telemetry for tracing. Note that a telemetry observability platform must also be configured.
;   enable_telemetry must either be 'True' or 'False'
;   default = False
enable_telemetry = False

; telemetry_otlp_endpoint
;   The endpoint for the Open Telemetry observability platform (eg Jaeger).
;   default = http://localhost:4318/v1/traces
telemetry_otlp_endpoint = http://localhost:4318/v1/traces

; telemetry_protocol
;   The protocol for Open Telemetry (can be 'http/protobuf' or 'grpc').
;   default = http/protobuf
telemetry_protocol = http/protobuf

