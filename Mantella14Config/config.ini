[Game]
; Settings for the games Mantella supports.

; game
;   Choose the game to run with Mantella.
;   Options: Skyrim, SkyrimVR, Fallout4, Fallout4VR
;   default = SkyrimVR
game = SkyrimVR

; skyrim_mod_folder
;   If you are using Mod Organizer 2, this path can be found by right-clicking the Mantella mod in your mod list and selecting 'Open in Explorer'.
;           If you are using Vortex, this path needs to be set to your Skyrim Special Edition\Data folder.
;           eg C:\Games\Steam\steamapps\common\Skyrim Special Edition\Data.
;           If this path is incorrect, NPCs will say the same voiceline on repeat.
;   Must be a valid system path. Target folder must contain folder 'Sound'!
;   default = C:\Modding\MO2\Skyrim\mods\Mantella
skyrim_mod_folder = C:\Games\Tharovin2\mods\Mantella14

; skyrimvr_mod_folder
;   If you are using Mod Organizer 2, this path can be found by right-clicking the Mantella mod in your mod list and selecting 'Open in Explorer'.
;           If you are using Vortex, this path needs to be set to your Skyrim VR\Data folder.
;           eg C:\Games\Steam\steamapps\common\Skyrim VR\Data.
;           If this path is incorrect, NPCs will say the same voiceline on repeat.
;   Must be a valid system path. Target folder must contain folder 'Sound'!
;   default = C:\Modding\MO2\SkyrimVR\mods\Mantella
skyrimvr_mod_folder = C:\Games\Tharovin2\mods\Mantella14

; fallout4_mod_folder
;   If you are using Mod Organizer 2, this path can be found by right-clicking the Mantella mod in your mod list and selecting 'Open in Explorer'.
;           If you are using Vortex, this path needs to be set to your Fallout 4\Data folder.
;           eg C:\Games\Steam\steamapps\common\Fallout 4\Data.
;           If this path is incorrect, NPCs will say the same voiceline on repeat.
;   Must be a valid system path. Target folder must contain folder 'Sound'!
;   default = C:\Modding\MO2\Fallout4\mods\Mantella
fallout4_mod_folder = C:\Modding\MO2\Fallout4\mods\Mantella

; fallout4vr_mod_folder
;   If you are using Mod Organizer 2, this path can be found by right-clicking the Mantella mod in your mod list and selecting 'Open in Explorer'.
;           If you are using Vortex, this path needs to be set to your Fallout 4 VR\Data folder.
;           eg C:\Games\Steam\steamapps\common\Fallout 4 VR\Data.
;           If this path is incorrect, NPCs will say the same voiceline on repeat.
;   Must be a valid system path. Target folder must contain folder 'Sound'!
;   default = C:\Modding\MO2\Fallout4VR\mods\Mantella
fallout4vr_mod_folder = C:\Modding\MO2\Fallout4VR\mods\Mantella

; fallout4_folder
;   The filepath of the Fallout 4 (desktop) directory where the executable is located.
;                           This path only needs to be set if `Vision`->`Use Game Screenshots` is enabled.
;   Must be a valid system path. Target folder must contain file 'Fallout4.exe'!
;   default = C:\Games\Steam\steamapps\common\Fallout 4
fallout4_folder = C:\Games\Steam\steamapps\common\Fallout 4

; fallout4vr_folder
;   The filepath of the Fallout 4 VR directory where the executable is located.
;                           This path only needs to be set if `Vision`->`Use Game Screenshots` is enabled.
;   Must be a valid system path. Target folder must contain file 'Fallout4VR.exe'!
;   default = C:\Games\Steam\steamapps\common\Fallout4VR
fallout4vr_folder = C:\Games\Steam\steamapps\common\Fallout4VR

[LLM]
; Settings for the LLM providers and the LLMs themselves.

; llm_api
;   Selects the LLM service to connect to (either local or via an API).
;   
;               If you are connecting to a local service (KoboldCpp, textgenwebui etc), please ensure that the service is running and a model is loaded. You can also ignore the dropdown options and instead enter a custom URL to connect to other LLM services that provide an OpenAI compatible endpoint.
;               After selecting a service, select the model using the option below. Press the *Update* button to load a list of models available from the service.
;   
;               If you are using an API (OpenAI, OpenRouter, etc) ensure you have the correct secret key set in `GPT_SECRET_KEY.txt` for the respective service you are using.
;   Options: OpenRouter, OpenAI, NanoGPT, KoboldCpp, textgenwebui
;   default = OpenRouter
llm_api = OpenRouter

; model
;   Select the model to use. Press the *Update* button to load a list of models available from the service selected above.
;                               The list does not provide all details about the models. For additional information please refer to the corresponding sites:
;                               - OpenRouter: https://openrouter.ai/docs#models
;                               - OpenAI: https://platform.openai.com/docs/models https://openai.com/api/pricing/
;   Options: Custom Model
;   default = google/gemma-4-26b-a4b-it:free
model = x-ai/grok-4-fast

; max_response_sentences_single
;   The maximum number of sentences returned by the LLM on each response in a player<->NPC conversation. Lower this value to reduce waffling.
;   Note: The setting 'Number Words TTS' in the Text-to-Speech tab takes precedence over this setting.
;   max_response_sentences_single must be an integer between 1 and 999
;   default = 4
max_response_sentences_single = 4

; max_response_sentences_multi
;   The maximum number of sentences returned by the LLM on each response in a player<->multi-NPC conversation. Lower this value to reduce waffling.
;   Note: The setting 'Number Words TTS' in the Text-to-Speech tab takes precedence over this setting.
;   max_response_sentences_multi must be an integer between 1 and 999
;   default = 12
max_response_sentences_multi = 8

; custom_token_count
;   If the model chosen is not recognised by Mantella, the token count for the given model will default to this number.
;                       If this is not the correct token count for your chosen model, you can change it here.
;                       Keep in mind that if this number is greater than the actual token count of the model, then Mantella will crash if a given conversation exceeds the model's token limit.
;   custom_token_count must be an integer between 4096 and 9999999
;   default = 4096
custom_token_count = 40096

; wait_time_buffer
;   Time to wait (in seconds) before generating the next voiceline.
;                           Mantella waits for the duration of a given voiceline's .wav file + an extra buffer to account for processing overhead.
;                           If you are noticing that some voicelines are not being said in-game, try increasing this buffer.
;   wait_time_buffer must be a floating point number between -999 and 999
;   default = 0
wait_time_buffer = 0.0

; llm_params
;   Parameters passed as part of the request to the LLM.
;                           A list of the most common parameters can be found here: https://openrouter.ai/docs/parameters.
;                           Note that available parameters can vary per LLM provider.
;   default = {
;       "max_tokens": 250,
;       "stop": ["#"]
;   }
llm_params = "{\n    \"max_tokens\": 250,\n    \"stop\": [\"\#\"]\n}"

; narration_handling
;   How to handle narrations in the output of the LLM.
;                                               - Cut narrations: Removes narrations from the output.
;                                               - Respective character speaks its narrations: The currently active character will speak it's actions out aloud.
;                                               - Use narrator: Narrations will be spoken by a special narrator. The voice model can be set by the config value 'Narrator voice' below.
;                                               - Deactivate handling of narrations: Any narration or speech indicators will be ignored during parsing.
;   
;                                               Note: The seperation of narration and speech is experimental and may not work if the LLM output is not formatted well.
;   Options: Cut narrations, Respective character speaks its narrations, Use narrator, Deactivate handling of narrations
;   default = Cut narrations
narration_handling = Cut narrations

; narrator_voice
;   Which voice model to use if 'Narration Handling' is set to 'Use narrator'.
;                           Must be a valid voice model from the current TTS. Same rules apply as for choosing a voice for the player.
narrator_voice =

; narration_start_indicators
;   List of characters used to identify the start of narrations in the LLM output.
;   Options: *, (, [
;   default = *, (, [
narration_start_indicators = *, (, [

; narration_end_indicators
;   List of characters used to identify the start of narrations in the LLM output.
;   Options: *, ), ]
;   default = *, ), ]
narration_end_indicators = *, ), ]

; speech_start_indicators
;   List of characters used to identify the end of narrations in the LLM output.
;   Options: "
;   default = "
speech_start_indicators = "

; speech_end_indicators
;   List of characters used to identify the start of speech in the LLM output.
;   Options: "
;   default = "
speech_end_indicators = "

; narration_indicators
;   Which narration indicators to use for sentences identified as narrations.
;                           If sentences get marked as narrations and are not cut, they will be surrounded by these narration indicators the next time they are fed back to the LLM.
;                           This helps to keep the LLM consistent in its use of narration indicators.
;   Options: (), **, []
;   default = ()
narration_indicators = ()

; claude_prompt_caching_enabled
;   WARNING: This is an experimental feature and may increase rather than decrease billing.
;                           Enable Claude prompt caching when using Anthropic Claude models via OpenRouter.
;   claude_prompt_caching_enabled must either be 'True' or 'False'
;   default = False
claude_prompt_caching_enabled = False

; allow_per_character_llm_overrides
;   Allow individual characters to use different LLM models/providers for one-on-one conversations.
;               To use this feature, add 'llm_service' and 'model' values under the appropriate columns in the characters CSV file.
;               Characters without these columns will fall back to the global LLM settings.
;               This feature only applies to one-on-one conversations, not multi-NPC.
;   allow_per_character_llm_overrides must either be 'True' or 'False'
;   default = False
allow_per_character_llm_overrides = False

; summary_llm_enabled
;   Enable a separate LLM client for generating conversation summaries.
;               When enabled, the Summary LLM settings below will be used instead of the main LLM settings.
;               When disabled, summaries use the same LLM as conversations.
;   summary_llm_enabled must either be 'True' or 'False'
;   default = False
summary_llm_enabled = False

; summary_llm_api
;   Selects the LLM service to use for generating conversation summaries.
;   
;               If you are connecting to a local service (KoboldCpp, textgenwebui etc), please ensure that the service is running and a model is loaded. You can also ignore the dropdown options and instead enter a custom URL to connect to other LLM services that provide an OpenAI compatible endpoint.
;               After selecting a service, select the model using the option below. Press the *Update* button to load a list of models available from the service.
;   
;               If you are using an API (OpenAI, OpenRouter, etc) ensure you have the correct secret key set in `GPT_SECRET_KEY.txt` for the respective service you are using.
;   
;               By default, summaries use the same LLM as conversations. Configure this to use a different model for summaries.
;   Options: OpenRouter, OpenAI, NanoGPT, KoboldCpp, textgenwebui
;   default = OpenRouter
summary_llm_api = OpenRouter

; summary_llm
;   Select the model to use for generating conversation summaries. Press the *Update* button to load a list of models available from the service selected above.
;                               You can use a different model for summaries than for conversations.
;                               The list does not provide all details about the models. For additional information please refer to the corresponding sites:
;                               - OpenRouter: https://openrouter.ai/docs#models
;                               - OpenAI: https://platform.openai.com/docs/models https://openai.com/api/pricing/
;   Options: Custom Model
;   default = google/gemma-4-26b-a4b-it:free
summary_llm = google/gemma-4-26b-a4b-it:free

; summary_custom_token_count
;   If the summary model chosen is not recognised by Mantella, the token count for the given model will default to this number.
;                       If this is not the correct token count for your chosen model, you can change it here.
;                       Keep in mind that if this number is greater than the actual token count of the model, then Mantella may crash if a given conversation exceeds the model's token limit.
;   summary_custom_token_count must be an integer between 4096 and 9999999
;   default = 4096
summary_custom_token_count = 4096

; summary_llm_params
;   Parameters passed as part of the request to the LLM.
;                           A list of the most common parameters can be found here: https://openrouter.ai/docs/parameters.
;                           Note that available parameters can vary per LLM provider.
;   default = {
;       "stop": ["#"]
;   }
summary_llm_params = "{\n    \"stop\": [\"\#\"]\n}"

; random_llm_enabled
;   Enable random LLM selection. When enabled, a random LLM will be picked from the pool at conversation start.
;   random_llm_enabled must either be 'True' or 'False'
;   default = False
random_llm_enabled = False

; random_llm_pool
;   JSON array of LLMs for random selection.
;                           Format: [{"service": "OpenRouter", "model": "google/gemma-4-26b-a4b-it:free"}, ...]
;   default = []
random_llm_pool = []

[TTS]
; Settings for the TTS methods Mantella supports.

; tts_service
;   The TTS service used by Mantella.
;   Options: Piper, XTTS, xVASynth
;   default = Piper
tts_service = xVASynth

; xvasynth_folder
;   The folder you have xVASynth downloaded to (the folder that contains xVASynth.exe).
;   Selected folder must contain subfolder '\resources\'!
;   Must be a valid system path. Target folder must contain file 'xVASynth.exe'!
;   default = C:\Games\Steam\steamapps\common\xVASynth
xvasynth_folder = C:\Games\Steam\steamapps\common\xVASynth

; xtts_server_folder
;   The folder you have the XTTS server downloaded to (the folder that contains xtts-api-server-mantella.exe).
;   Must be a valid system path. Target folder must contain file 'xtts-api-server-mantella.exe'!
;   default = C:\Games\Steam\steamapps\common\XTTS
xtts_server_folder = C:\Games\Steam\steamapps\common\XTTS

; piper_folder
;   The folder where Piper is installed (where piper.exe exists).
piper_folder =

; lipgen_folder
;   The LipGenerator program is required by Bethesda games to accurately lip sync voicelines.
;                           Please install the Creation Kit from Steam. Once installed, set this path to be the same path as your game folder (where the executable is located).
lipgen_folder = C:\Games\Tharovin2\Stock Game\

; facefx_folder
;   The FaceFXWrapper is an alternative program to LipGenerator. Lip sync generation is required by Bethesda games to accurately lip sync voicelines.
;                                   This path does not need to be set if you have the LipGenerator folder configured.
facefx_folder =

; number_words_tts
;   Minimum threshold of words in a sentence needed before sending to the TTS service.
;                           TTS services often struggle with synthesizing short voicelines, so increasing this threshold can improve quality.
;   number_words_tts must be an integer between 1 and 999999
;   default = 3
number_words_tts = 3

; lip_generation
;   Whether to generate lip sync files for spoken voicelines. Disable this setting to improve response times.
;                           Set to 'Lazy' to skip lip syncing only for the first sentence spoken of every response.
;   Options: Enabled, Lazy, Disabled
;   default = Enabled
lip_generation = Enabled

; fast_response_mode
;   Whether to play the first voiceline of every response directly from the Mantella exe instead of in-game (Skyrim only).
;                           Enable this setting to improve response times.
;                           Disable this setting to play all voicelines natively in-game.
;   fast_response_mode must either be 'True' or 'False'
;   default = False
fast_response_mode = False

; fast_response_mode_volume
;   Adjust the volume of the first delivered voiceline (from 1-100) if Fast Response Mode is enabled.
;   fast_response_mode_volume must be an integer between 1 and 100
;   default = 40
fast_response_mode_volume = 40

; allow_per_character_tts_overrides
;   Allow individual characters to use a different TTS service in conversations.
;               To use this feature, add a 'tts_service' value under the appropriate column in the characters CSV file.
;               Characters without this column will fall back to the global TTS settings.
;   allow_per_character_tts_overrides must either be 'True' or 'False'
;   default = False
allow_per_character_tts_overrides = False

; xtts_url
;   The URL that your XTTS server is running on.
;                           Examples:
;                           http://127.0.0.1:8020 when running XTTS locally.
;                           https://{POD_ID}-8020.proxy.runpod.net when running XTTS in a RunPod GPU pod.
;   default = http://127.0.0.1:8020
xtts_url = http://127.0.0.1:8020

; xtts_default_model
;   Official base XTTS-V2 model to use.
;   Options: v2.0.0, v2.0.1, v2.0.2, v2.0.3, main
;   default = main
xtts_default_model = main

; xtts_device
;   Set to cpu or cuda (NVIDIA GPUs only). You can also specify which NVIDIA GPU to use (cuda:0, cuda:1 etc)
;   Options: cpu, cuda, cuda:0, cuda:1, cuda:2, cuda:3, cuda:4, cuda:5, cuda:6, cuda:7
;   default = cpu
xtts_device = cpu

; xtts_deepspeed
;   Allows you to speed up processing by several times (highly recommended for NVIDIA GPU players!).
;   Only usable with an NVIDIA GPU that supports CUDA 11.8+.
;   xtts_deepspeed must either be 'True' or 'False'
;   default = False
xtts_deepspeed = False

; xtts_lowvram
;   The mode in which the model will be stored in RAM and when the processing occurs it will move to VRAM. The difference in speed is small.
;                       If you don't want to pre-generate the latents for every speaker, enable this setting or else it will generate the latents at every start.
;   xtts_lowvram must either be 'True' or 'False'
;   default = True
xtts_lowvram = True

; xtts_data
;   Default settings passed to the XTTS API server.
;   default = {"temperature": 0.75,
;                       "length_penalty": 1.0,
;                       "repetition_penalty": 5.0,
;                       "top_k": 50,
;                       "top_p": 0.85,
;                       "speed": 1,
;                       "enable_text_splitting": true,
;                       "stream_chunk_size": 100}
xtts_data = "{\"temperature\": 0.75,\n                    \"length_penalty\": 1.0,\n                    \"repetition_penalty\": 5.0,\n                    \"top_k\": 50,\n                    \"top_p\": 0.85,\n                    \"speed\": 1,\n                    \"enable_text_splitting\": true,\n                    \"stream_chunk_size\": 100}"

; xtts_accent
;   Note that this setting is only available for Skyrim.
;           Changes the 'accent' of NPCs by sending the language value from data/Skyrim/skyrim_characters.csv's lang_override column to XTTS.
;   This helps give NPC's unique-sounding voices, even when they use the same base voice model.
;   xtts_accent must either be 'True' or 'False'
;   default = False
xtts_accent = False

; tts_print
;   Print the output from the TTS service in the Mantella.exe window.
;   tts_print must either be 'True' or 'False'
;   default = False
tts_print = False

; tts_process_device
;   Whether to run xVASynth server (unless already running) on your CPU or a NVIDIA GPU (with CUDA installed).
;   This setting has a minimal effect on response times.
;   Options: cpu, gpu
;   default = cpu
tts_process_device = cpu

; pace
;   The default speed of talking. The effect can vary between voices.
;                           0.5 = 2x faster; 2 = 2x slower
;   pace must be a floating point number between 0.1 and 2.0
;   default = 1.0
pace = 1.0

; use_cleanup
;   Whether to try to reduce noise and the robot-sounding nature of xVASynth generated speech.
;                           Has a slight impact on processing speed for the CPU.
;                           Not meant to be used on voices that have post-effects attached to them (echoes, reverbs, etc).
;   use_cleanup must either be 'True' or 'False'
;   default = False
use_cleanup = False

; use_sr
;   Whether to improve the quality of your audio through Super-resolution of 22050Hz audio into 48000Hz audio.
;                           This is a fairly slow process on CPUs, but on some GPUs it can be relatively fast.
;   use_sr must either be 'True' or 'False'
;   default = False
use_sr = False

[STT]
; Settings for the STT methods Mantella supports.

; audio_threshold
;   Controls how much background noise is filtered out (from 0-1).
;                                           If the mic is not picking up speech, try lowering this value.
;                                           If the mic is picking up too much background noise, try increasing this value.
;   audio_threshold must be a floating point number between 0 and 1
;   default = 0.4
audio_threshold = 0.4

; allow_interruption
;   Sets whether the player can interrupt NPCs mid-response.
;                           Disable this setting if your microphone tends to pick up background noise or is picking up in-game speech. Alternatively, try increasing `Audio Threshold`.
;   allow_interruption must either be 'True' or 'False'
;   default = True
allow_interruption = True

; save_mic_input
;   Whether to save captured mic input to Documents/My Games/Mantella/data/tmp/mic/.
;                           Enable this setting to test your mic quality.
;                           Disable this setting to improve performance.
;   save_mic_input must either be 'True' or 'False'
;   default = False
save_mic_input = False

; stt_service
;   Choose between running Moonshine or Whisper as your speech to text service.
;                           Moonshine runs faster than Whisper on a CPU, but only support English.
;                           Whisper can run on a CPU, GPU, or via an external service (see Advanced settings below).
;   Options: Moonshine, Whisper
;   default = Moonshine
stt_service = Whisper

; pause_threshold
;   How long to wait (in seconds) before converting mic input to text.
;                       If you feel like you are being cut off before you finish your response, increase this value.
;                       If you feel like there is too much of a delay between you finishing your response and the text conversion, decrease this value.
;                       Set this value to 0 for faster response times.
;   pause_threshold must be a floating point number between 0 and 999
;   default = 0.25
pause_threshold = 0.25

; ptt_enabled
;   When enabled, speech is only captured while the PTT hotkey is held.
;   ptt_enabled must either be 'True' or 'False'
;   default = False
ptt_enabled = False

; ptt_hotkey
;   Examples: V, SPACE, ENTER, F1..F12.
;   default = V
ptt_hotkey = V

; play_cough_sound
;   If enabled, a generic cough sound will play when the speech-to-text service fails to transcribe player input.
;                           Enable this setting if you are playing in VR / full screen and need an audio cue to know when you haven't been heard.
;                           Disable this setting if its annoying.
;   play_cough_sound must either be 'True' or 'False'
;   default = True
play_cough_sound = True

; listen_timeout
;   How long to wait (in seconds) for the player to speak before retrying.
;                       This needs to be set to ensure that Mantella can periodically check if the conversation has ended.
;   listen_timeout must be an integer between 0 and 999
;   default = 30
listen_timeout = 30

; moonshine_model_size
;   The size of the Moonshine model to use (sorted from smallest to largest). The larger the model, the more accurate the transcription (at the cost of speed).
;   Options: moonshine/tiny/quantized_4bit, moonshine/tiny/quantized, moonshine/tiny/float, moonshine/base/quantized_4bit, moonshine/base/quantized, moonshine/base/float
;   default = moonshine/tiny/quantized
moonshine_model_size = moonshine/tiny/quantized

; whisper_model_size
;   The size of the Whisper model used. Some languages require larger models. The base.en model works well enough for English.
;                           See here for a comparison of languages and their Whisper performance:
;                           https://github.com/openai/whisper#available-models-and-languages
;   
;                           faster-skyrim-whisper-base.en is trained on Skyrim dialogue. It is more accurate in transcribing Skyrim names and locations:
;                           https://github.com/mikastamm/skyrim-whisper-base.en
;   Options: tiny, tiny.en, base, base.en, Numbat/faster-skyrim-whisper-base.en, small, small.en, distil-small.en, medium, medium.en, distil-medium.en, large-v1, large-v2, large-v3, distil-large-v2, distil-large-v3, whisper-1
;   default = base
whisper_model_size = medium.en

; proactive_mic_mode
;   If enabled, mic input will be transcribed continuously (every `Refresh Frequency` seconds) as long as speech is detected.
;                           Enable this setting to improve response times.
;                           Disable this setting to improve performance.
;   proactive_mic_mode must either be 'True' or 'False'
;   default = False
proactive_mic_mode = False

; min_refresh_secs
;   Controls how frequently mic input is transcribed by Moonshine / Whisper.
;                           Increase this value if the frequency is too intense for your hardware.
;                           Decrease this value to improve response times.
;   min_refresh_secs must be a floating point number between 0.01 and 999
;   default = 0.3
min_refresh_secs = 0.3

; external_whisper_service
;   Allows running of Whisper externally. When enabled, Mantella will call the URL set in 'Whisper URL' instead of running Whisper locally.
;   external_whisper_service must either be 'True' or 'False'
;   default = False
external_whisper_service = False

; whisper_url
;   The external Whisper service URL Mantella will connect to (if 'External Whisper Service' is enabled).
;                           Some services require an API secret key. This secret key can be set in your `GPT_SECRET_KEY.txt` file. If you don't see the service you would like to connect to in the dropdown list, you can also manually enter a URL to connect to.
;   
;                           Known services:
;   	                        OpenAI: Ensure 'Speech-to-Text'->'Model Size' is set to `whisper-1`. Requires an OpenAI secret key.
;                               Groq: Ensure 'Speech-to-Text'->'Model Size' is set to one of the following: https://console.groq.com/docs/speech-text#supported-models. Requires a Groq secret key.
;                               whisper.cpp: whisper.cpp (https://github.com/ggerganov/whisper.cpp) can be connected to when it is run in server mode. No secret key is required. Ensure the server is running before starting Mantella. By default, selecting whisper.cpp will connect to the URL http://127.0.0.1:8080/inference, but you can also manually enter a URL in this field if you have selected a port other than 8080 or are running whisper.cpp on another machine.
;   Options: OpenAI, Groq, whisper.cpp
;   default = OpenAI
whisper_url = OpenAI

; stt_language
;   The player's spoken language.
;   Options: default, en, ar, cs, da, de, el, es, fi, fr, hi, hu, it, ja, ko, nl, pl, pt, ro, ru, sv, sw, uk, ha, tr, vi, yo
;   default = default
stt_language = default

; stt_translate
;   Translate the transcribed speech to English if supported by the Speech-To-Text engine (only impacts faster_whisper option, no impact on whispercpp, which is controlled by your server).
;                           STTs that support this function: Whisper (faster_whisper).
;   stt_translate must either be 'True' or 'False'
;   default = False
stt_translate = False

; process_device
;   Whether to run Whisper on your CPU or NVIDIA GPU (with CUDA installed) (only impacts faster_whisper option, no impact on whispercpp, which is controlled by your server).
;   Options: cpu, cuda
;   default = cpu
process_device = cpu

; moonshine_folder
;   The folder where Moonshine models are installed (where tiny/ and base/ folders exist).
moonshine_folder =

; silence_auto_response_enabled
;   If enabled, the AI will automatically generate a response if the player is silent for a period of time.
;   silence_auto_response_enabled must either be 'True' or 'False'
;   default = False
silence_auto_response_enabled = False

; silence_auto_response_timeout
;   How long to wait (in seconds) for the player to speak before automatically generating a response.
;   silence_auto_response_timeout must be a floating point number between 1 and 999
;   default = 30.0
silence_auto_response_timeout = 30.0

; silence_auto_response_max_count
;   The maximum number of consecutive auto-responses before auto-response is disabled (until the player speaks again).
;                           This is mainly to prevent runaway API costs if the player leaves the conversation running unattended.
;   silence_auto_response_max_count must be an integer between 1 and 999
;   default = 5
silence_auto_response_max_count = 5

; silence_auto_response_message
;   The message sent to the AI when the player is silent.
;   default = ...
silence_auto_response_message = ...

[Vision]
; Vision settings.

; vision_enabled
;   If enabled, in-game screenshots are passed to the chosen LLM with each player response.
;                           This feature is only compatible with LLMs that accept image as well as text input, unless `Custom Vision Model` is enabled.
;                           Please ensure your game window is visible on screen when running and is not blocked by other windows!
;   vision_enabled must either be 'True' or 'False'
;   default = False
vision_enabled = True

; low_resolution_mode
;   Resizes the image to 512x512 pixels (cropping the edges of the longest side). Enable this setting to lower API costs and improve performance.
;   low_resolution_mode must either be 'True' or 'False'
;   default = True
low_resolution_mode = True

; save_screenshot
;   Whether to save screenshots to Documents/My Games/Mantella/data/tmp/images/. Disable this setting to improve performance.
;   save_screenshot must either be 'True' or 'False'
;   default = True
save_screenshot = False

; image_quality
;   The quality of the image passed to the LLM from 1-100. Higher values improve the LLM's understanding of passed images. Lower values slightly improve performance. This setting has no affect on API costs.
;   image_quality must be an integer between 1 and 100
;   default = 50
image_quality = 100

; resize_method
;   The image scaling algorithm used to resize in-game screenshots to match the target resolution. Algorithms are sorted from fastest / lowest quality (Nearest) to slowest / highest quality (Lanczos).
;   Options: Nearest, Linear, Cubic, Lanczos
;   default = Nearest
resize_method = Nearest

; capture_offset
;   The number of pixels to offset the capture window. Adjust these numbers with either positive or negative values if the game window is not being captured in the correct dimensions.
;   default = {"left": 0, "right": 0, "top": 0, "bottom": 0}
capture_offset = {"left": 0, "right": 0, "top": 0, "bottom": 0}

; custom_vision_model
;   Whether to call a separate vision-capable LLM for image handling (NPCs will still respond using the model chosen in the `Large Language Model` tab).
;                           If enabled, please configure the vision-capable LLM to connect to below.
;                           Note that calling a separate LLM for image handling will increase response times.
;   custom_vision_model must either be 'True' or 'False'
;   default = False
custom_vision_model = False

; vision_llm_api
;   Selects the vision model service to connect to (either local or via an API).
;   
;               If you are connecting to a local service (KoboldCpp, textgenwebui etc), please ensure that the service is running and a model is loaded. You can also enter a custom URL to connect to other LLM services that provide an OpenAI compatible endpoint.
;               After selecting a service, select the model using the option below. Press the *Update* button to load a list of models available from the service.
;   
;               Some services require an API secret key. This secret key can be set in your `GPT_SECRET_KEY.txt` file.
;   Options: OpenRouter, OpenAI, NanoGPT, KoboldCpp, textgenwebui
;   default = OpenRouter
vision_llm_api = OpenRouter

; vision_model
;   Select the vision model to use. Press the *Update* button to load a list of models available from the service selected above.
;                               The list does not provide all details about the models. For additional information please refer to the corresponding sites:
;                               - OpenRouter: https://openrouter.ai/models?modality=text%2Bimage-%3Etext
;                               - OpenAI: https://platform.openai.com/docs/models https://openai.com/api/pricing/
;   Options: Custom Model
;   default = google/gemma-3-27b-it:free
vision_model = google/gemma-3-27b-it:free

; vision_custom_token_count
;   If the vision model chosen is not recognised by Mantella, the token count for the given model will default to this number.
;                       If this is not the correct token count for your chosen model, you can change it here.
;                       Keep in mind that if this number is greater than the actual token count of the model, then Mantella will crash if a given conversation exceeds the model's token limit.
;   vision_custom_token_count must be an integer between 4096 and 9999999
;   default = 4096
vision_custom_token_count = 4096

; vision_llm_params
;   Parameters passed as part of the request to the vision model.
;                           A list of the most common parameters can be found here: https://openrouter.ai/docs/parameters.
;                           Note that available parameters can vary per LLM provider.
;   default = {
;                           "max_tokens": 100,
;                           "stop": ["#"]
;                       }
vision_llm_params = "{\n                        \"max_tokens\": 100,\n                        \"stop\": [\"\#\"]\n                    }"

; use_game_screenshots
;   Whether to use screenshots taken in-game instead of relying on Mantella to capture the game window (Fallout 4 only).
;                           Enable this setting to improve screenshot capture reliability. Otherwise please ensure your game window is visible on screen when running and is not blocked by other windows.
;                           If enabled, please ensure you configure screenshot capture settings in the Mantella Pip-Boy settings window.
;   use_game_screenshots must either be 'True' or 'False'
;   default = False
use_game_screenshots = False

; vision_timeout
;   Maximum time in seconds to wait for a vision description before continuing a radiant (NPC-to-NPC) conversation without it.
;   Set to 0 to run vision fully in the background: the conversation never blocks on it, and the description is injected as an in-game event once it arrives (recommended).
;   Increase this value if you want the vision description to be available before the next NPC turn even on slower vision models.
;   vision_timeout must be an integer between 0 and 60
;   default = 0
vision_timeout = 0

; periodic_vision_interval
;   Time interval in seconds between periodic vision updates during a radiant (NPC-to-NPC) conversation.
;   While a radiant conversation is running, a new screenshot is captured at most every this many seconds and injected as an observation event when ready.
;   Set to 0 to disable periodic vision updates (vision is then only captured once at the start of a radiant conversation).
;   Higher values reduce vision-model calls; lower values make NPCs more responsive to visual changes around them.
;   periodic_vision_interval must be an integer between 0 and 600
;   default = 20
;   Note: values above ~radiant_max_turns * ~10s will rarely fire since radiant
;   conversations usually end before the interval elapses. 15-30s is a good range.
periodic_vision_interval = 40

[Actions]
; Settings for in-game actions.

; advanced_actions_enabled
;   If enabled, LLMs with tool calling capabilities can trigger advanced in-game actions.
;                           If disabled, only basic actions can be triggered by the LLM using an '[action_name]: [NPC response]' format (eg 'Follow: Lead the way').
;                           Actions without a 'prompt' field defined in the action's JSON file (see data/actions/) can only be triggered when this setting is enabled.
;   advanced_actions_enabled must either be 'True' or 'False'
;   default = False
advanced_actions_enabled = True

; disabled_actions
;   Actions not selected here will be available in conversations.
;                           Some actions can only be triggered when `Advanced Actions` is enabled above.
;                           To learn more about an action, see the associated JSON file in the data/actions/ folder.
;   Options: AbsolveCrime, AddToConversation, Attack, Barter, Brawl, CancelTravel, CastSpell, CheckDirections, CollectIngredients, Emote, EndConversation, Flee, Follow, Inventory, LeadTo, Listen, Look, Loot, MoveTo, ReportCrime, ShareConversation, StandDown, Teleport, TravelTo, Unfollow, Wait
;   default = AbsolveCrime, AddToConversation, Brawl, CancelTravel, CastSpell, CheckDirections, CollectIngredients, Emote, Follow, LeadTo, Look, Loot, ReportCrime, ShareConversation, Teleport, TravelTo, Unfollow, Wait
disabled_actions = AbsolveCrime, AddToConversation, Brawl, CancelTravel, CheckDirections, Follow, LeadTo, Loot, ReportCrime, ShareConversation, Teleport, TravelTo, Unfollow, Wait

; custom_function_model
;   Whether to call a separate tool-calling-capable LLM for advanced action handling (NPC verbal responses will still use the model chosen in the `Large Language Model` tab).
;                           If enabled, please configure the tool-calling-capable LLM to connect to below.
;                           If disabled, the model chosen in the `Large Language Model` tab will be used for both verbal responses and advanced action handling (if advanced actions are enabled).
;   custom_function_model must either be 'True' or 'False'
;   default = False
custom_function_model = False

; function_llm_api
;   Selects the LLM service to connect to (either local or via an API) that will handle NPC actions.
;               Please ensure the selected model supports tool calling.
;               If you are connecting to a local service (KoboldCpp, textgenwebui etc), please ensure that the service is running and a model is loaded. You can also enter a custom URL to connect to other LLM services that provide an OpenAI compatible endpoint.
;               After selecting a service, select the model using the option below. Press the *Update list* button to load a list of models available from the service.
